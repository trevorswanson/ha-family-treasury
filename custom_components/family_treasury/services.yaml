create_account:
  name: Create Account
  description: Create a new Family Treasury account.
  fields:
    account_id:
      name: Account ID
      description: Unique account ID slug (lowercase letters, numbers, and underscores only).
      example: emma
      required: true
      selector:
        text:
    display_name:
      name: Display Name
      description: Friendly account name.
      example: Emma
      required: true
      selector:
        text:
    account_type:
      name: Account Type
      description: Account type. Use loan for debt accounts.
      example: primary
      required: false
      selector:
        select:
          options:
            - primary
            - bucket
            - loan
    parent_account_id:
      name: Parent Account ID
      description: Parent primary account slug for child accounts and loans.
      example: emma
      required: false
      selector:
        text:
    initial_balance:
      name: Initial Balance
      description: Initial balance. For loans this is the principal to disburse.
      example: 25.00
      required: false
      selector:
        number:
          mode: box
    apr_percent:
      name: APR Percent
      description: Optional account APR override.
      example: 4.5
      required: false
      selector:
        number:
          min: 0
          mode: box
    interest_calc_frequency:
      name: Interest Calculation Frequency
      description: Optional interest accrual frequency.
      example: daily
      required: false
      selector:
        select:
          options:
            - daily
            - weekly
            - monthly
    interest_payout_frequency:
      name: Interest Payout Frequency
      description: Optional frequency for paying pending interest into balance.
      example: monthly
      required: false
      selector:
        select:
          options:
            - daily
            - weekly
            - monthly
    currency_code:
      name: Currency Code
      description: Optional ISO 4217 currency code override.
      example: USD
      required: false
      selector:
        text:
    locale:
      name: Locale
      description: Optional locale override for currency formatting.
      example: en_US
      required: false
      selector:
        text:

update_account:
  name: Update Account
  description: Update account settings.
  fields:
    account_id:
      name: Account ID
      description: Existing account ID slug (lowercase letters, numbers, and underscores only).
      example: emma
      required: true
      selector:
        text:
    display_name:
      name: Display Name
      description: Updated friendly account name.
      example: Emma Savings
      required: false
      selector:
        text:
    active:
      name: Active
      description: Set to false to archive/deactivate the account.
      example: true
      required: false
      selector:
        boolean:
    apr_percent:
      name: APR Percent
      description: Updated APR percentage for this account.
      example: 3.25
      required: false
      selector:
        number:
          min: 0
          mode: box
    interest_calc_frequency:
      name: Interest Calculation Frequency
      description: Updated interest accrual frequency.
      example: weekly
      required: false
      selector:
        select:
          options:
            - daily
            - weekly
            - monthly
    interest_payout_frequency:
      name: Interest Payout Frequency
      description: Updated frequency for paying pending interest into balance.
      example: monthly
      required: false
      selector:
        select:
          options:
            - daily
            - weekly
            - monthly
    currency_code:
      name: Currency Code
      description: Updated ISO 4217 currency code.
      example: ISK
      required: false
      selector:
        text:
    locale:
      name: Locale
      description: Updated locale for currency formatting.
      example: is_IS
      required: false
      selector:
        text:

deposit:
  name: Deposit
  description: Deposit funds into an account.
  fields:
    account_id:
      name: Account ID
      description: Existing account ID slug (lowercase letters, numbers, and underscores only).
      example: emma
      required: true
      selector:
        text:
    amount:
      name: Amount
      description: Deposit amount.
      example: 10.00
      required: true
      selector:
        number:
          min: 0
          mode: box
    description:
      name: Description
      description: Optional transaction note.
      example: Weekly allowance
      required: false
      selector:
        text:

withdraw:
  name: Withdraw
  description: Withdraw funds from an account.
  fields:
    account_id:
      name: Account ID
      description: Existing account ID slug (lowercase letters, numbers, and underscores only).
      example: emma
      required: true
      selector:
        text:
    amount:
      name: Amount
      description: Withdrawal amount.
      example: 5.50
      required: true
      selector:
        number:
          min: 0
          mode: box
    description:
      name: Description
      description: Optional transaction note.
      example: Bought a book
      required: false
      selector:
        text:

adjust_balance:
  name: Adjust Balance
  description: Apply a signed administrative adjustment.
  fields:
    account_id:
      name: Account ID
      description: Existing account ID slug (lowercase letters, numbers, and underscores only).
      example: emma
      required: true
      selector:
        text:
    amount:
      name: Amount
      description: Signed adjustment amount.
      example: -1.25
      required: true
      selector:
        number:
          mode: box
    description:
      name: Description
      description: Reason for administrative adjustment.
      example: Correction for duplicate entry
      required: false
      selector:
        text:

transfer:
  name: Transfer
  description: Transfer funds between two accounts in the same ownership tree.
  fields:
    source_account_id:
      name: Source Account ID
      description: Account slug to debit.
      example: emma
      required: true
      selector:
        text:
    destination_account_id:
      name: Destination Account ID
      description: Account slug to credit.
      example: emma_loan_1
      required: true
      selector:
        text:
    amount:
      name: Amount
      description: Positive transfer amount.
      example: 5.00
      required: true
      selector:
        number:
          min: 0
          mode: box
    description:
      name: Description
      description: Optional transfer note.
      example: Loan repayment
      required: false
      selector:
        text:

get_transactions:
  name: Get Transactions
  description: Query transactions with filters and pagination.
  fields:
    account_id:
      name: Account ID
      description: Optional account ID slug filter.
      example: emma
      required: false
      selector:
        text:
    start:
      name: Start
      description: Optional start datetime (ISO format).
      example: "2026-02-01T00:00:00-05:00"
      required: false
      selector:
        text:
    end:
      name: End
      description: Optional end datetime (ISO format).
      example: "2026-02-29T23:59:59-05:00"
      required: false
      selector:
        text:
    type:
      name: Types
      description: Optional transaction type filters (choose one or more).
      example:
        - deposit
        - withdraw
      required: false
      selector:
        select:
          multiple: true
          options:
            - deposit
            - withdraw
            - adjustment
            - interest_accrual
            - interest_payout
            - transfer_out
            - transfer_in
    limit:
      name: Limit
      description: Maximum number of records to return.
      example: 100
      required: false
      selector:
        number:
          min: 1
          max: 500
          mode: box
    offset:
      name: Offset
      description: Number of matching records to skip.
      example: 0
      required: false
      selector:
        number:
          min: 0
          mode: box
