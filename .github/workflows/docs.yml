name: Docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            tox.ini

      - name: Install docs tooling
        run: python -m pip install --upgrade pip tox

      - name: Run docs lint and link checks
        run: tox -q -e docs
