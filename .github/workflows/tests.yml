name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            requirements_test.txt
            tox.ini

      - name: Install test tooling
        run: python -m pip install --upgrade pip tox diff-cover

      - name: Run tests with coverage gates
        run: tox -q -e coverage

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@v1.7.1
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
          title: Coverage Report

      - name: Enforce changed-line coverage (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          diff-cover coverage.xml --compare-branch "origin/${{ github.base_ref }}" --fail-under 100 --include custom_components/family_treasury/*

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            pytest.xml
            htmlcov/
