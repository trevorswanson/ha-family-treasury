[tox]
envlist = coverage
skipsdist = true

[testenv]
description = Run unit tests for Family Treasury
basepython = python3.14
deps = -r requirements_test.txt
setenv =
    PYTHONDONTWRITEBYTECODE=1
commands =
    python -m pytest -q {posargs}

[testenv:coverage]
description = Run tests with overall coverage requirements
deps = {[testenv]deps}
commands =
    python -m pytest -q --junitxml=pytest.xml --cov=custom_components/family_treasury --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under={env:COV_FAIL_UNDER:65} {posargs}

[testenv:diff-coverage]
description = Run tests with overall and changed-line coverage requirements
deps =
    {[testenv]deps}
    diff-cover>=9,<10
commands =
    python -m pytest -q --junitxml=pytest.xml --cov=custom_components/family_treasury --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under={env:COV_FAIL_UNDER:65} {posargs}
    diff-cover coverage.xml --compare-branch={env:DIFF_COVER_COMPARE_BRANCH:origin/main} --fail-under={env:DIFF_COVER_FAIL_UNDER:100} --include custom_components/family_treasury/*

[testenv:docs]
description = Run markdown lint and link checks for documentation
deps = {[testenv]deps}
commands =
    pymarkdown --disable-rules MD013 scan README.md CONTRIBUTING.md AGENTS.md docs/**/*.md
    python scripts/check_markdown_links.py README.md CONTRIBUTING.md AGENTS.md docs/*.md
