title: Family Treasury
views:
  - title: Accounts
    path: accounts
    cards:
      - type: entities
        title: Emma Account
        entities:
          - entity: sensor.emma_balance
          - entity: sensor.emma_pending_interest
      - type: history-graph
        title: Emma Balance History
        entities:
          - entity: sensor.emma_balance
        hours_to_show: 720
      - type: custom:family-treasury-transactions
        title: Emma Recent Transactions
        account_id: emma
        page_size: 10
        enable_pagination: true
