title: Family Treasury
views:
  - title: Accounts
    path: accounts
    cards:
      - type: entities
        title: Emma Account
        entities:
          - entity: sensor.emma_balance
          - entity: sensor.emma_pending_interest
      - type: history-graph
        title: Emma Balance History
        entities:
          - entity: sensor.emma_balance
        hours_to_show: 720
      - type: markdown
        title: Recent Transactions
        content: |
          Use `family_treasury.get_transactions` in Developer Tools > Actions,
          or display `recent_transactions` from the balance sensor attributes.
